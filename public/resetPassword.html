  <main aria-labelledby="reset-title" class="paws-auth-shell">
    <div class="paws-auth-card" role="form" aria-describedby="reset-help">
      <a class="paws-brand-mini" href="index.html" aria-label="Back to home">
        <span class="logo"></span><span>Paws &amp; Company</span>
      </a>

      <h1 id="reset-title">Reset password</h1>
      <p class="paws-note-legal" id="reset-help">
        Enter the email associated with your account, and we’ll send you a link to reset your password.
      </p>

      <form id="resetForm" action="/auth/reset" method="post" novalidate>
        <div class="paws-form-group">
          <label for="email">Email</label>
          <input
            class="paws-input"
            id="email"
            name="email"
            type="email"
            autocomplete="email"
            placeholder="you@example.com"
            required
          />
        </div>

        <button class="paws-btn-primary" type="submit">
          <i class="fa-regular fa-envelope" aria-hidden="true"></i>
          <span>Send reset link</span>
        </button>

        <div id="resetMsg" class="paws-form-message" role="status" aria-live="polite"></div>
      </form>

      <hr class="divider" />

      <div class="paws-panel">
        <div class="title">Remembered your password?</div>
        <!-- ✅ Updated link back to Sign In -->
        <a class="paws-btn secondary" href="signIn.html" role="button">Back to sign in</a>
      </div>
    </div>
  </main>

  <!-- <footer>
    <p>© 2025 Paws &amp; Company | <a href="privacy.html">Privacy</a> | <a href="terms.html">Terms</a></p>

  <script>
  // Simple async reset handler (optional)
  (function () {
    const form = document.getElementById('resetForm');
    const msg = document.getElementById('resetMsg');
    if (!form) return;

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      msg.textContent = 'Sending...';
      msg.classList.remove('error', 'success');

      try {
        const fd = new FormData(form);
        const res = await fetch(form.action, { method: 'POST', body: fd });
        if (res.ok) {
          msg.textContent = 'If that email exists, a reset link has been sent.';
          msg.classList.add('success');
          form.reset();
        } else {
          msg.textContent = 'Something went wrong. Please try again.';
          msg.classList.add('error');
        }
      } catch (err) {
        msg.textContent = 'Network error. Please try again.';
        msg.classList.add('error');
      }
    });
  })();

  // Mobile nav toggle
  (function () {
    const btn = document.querySelector('.paws-nav-toggle');
    const list = document.getElementById('site-menu');
    if (!btn || !list) return;
    btn.addEventListener('click', function () {
      const expanded = this.getAttribute('aria-expanded') === 'true';
      this.setAttribute('aria-expanded', String(!expanded));
      list.classList.toggle('open');
    });
  })();
  </script>
