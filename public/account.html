<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Account | Paws & Company</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
  <link href="stylesheets/main.css" rel="stylesheet" />

  <style>
    :root {
      --accent-color: #2a7ae2;
      --card-radius: 1rem;
      --card-border: 1px solid #e6e6e6;
      --card-shadow: 0 4px 14px rgba(0, 0, 0, .06);
      --card-bg: #fff;
    }

    .account-shell {
      max-width: 1200px;
      margin: 2rem auto;
      padding: 0 1rem;
    }

    .account-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .account-header h1 {
      font-size: 2rem;
      color: #222;
      margin: 0;
    }

    .btn-logout {
      background: #dc2626;
      color: #fff;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      border: none;
      transition: background 0.2s ease;
    }

    .btn-logout:hover {
      background: #b91c1c;
      text-decoration: none;
    }

    .btn-logout:active {
      transform: scale(0.98);
    }

    .account-tabs {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      border-bottom: 2px solid #e5e7eb;
      flex-wrap: wrap;
    }

    .account-tabs button {
      background: none;
      border: none;
      padding: 1rem 1.5rem;
      font-size: 1rem;
      font-weight: 600;
      color: #666;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: all 0.2s;
    }

    .account-tabs button.active {
      color: var(--accent-color);
      border-bottom-color: var(--accent-color);
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .account-card {
      background: var(--card-bg);
      border: var(--card-border);
      border-radius: var(--card-radius);
      box-shadow: var(--card-shadow);
      padding: 2rem;
      margin-bottom: 2rem;
    }

    .account-card h2 {
      margin-top: 0;
      color: #111827;
      font-size: 1.5rem;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
    }

    @media (max-width: 720px) {
      .form-grid {
        grid-template-columns: 1fr;
      }
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .form-group label {
      font-weight: 600;
      color: #111827;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-family: 'Poppins', sans-serif;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--accent-color);
      box-shadow: 0 0 0 3px rgba(42, 122, 226, 0.1);
    }

    .btn-primary {
      background: var(--accent-color);
      color: #fff;
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      transition: all 0.2s ease;
    }

    .btn-primary:hover {
      background: #1f5fc1;
    }

    .btn-primary.btn-sm {
      padding: 0.4rem 0.8rem;
      font-size: 0.875rem;
      margin-top: 0.5rem;
      margin-right: 0.5rem;
    }

    .message {
      padding: 1rem;
      border-radius: 8px;
      margin-bottom: 1rem;
      display: none;
    }

    .message.show {
      display: block;
    }

    .message.success {
      background: #10b98122;
      color: #065f46;
      border: 1px solid #10b98155;
    }

    .message.error {
      background: #fecaca44;
      color: #7f1d1d;
      border: 1px solid #fecaca77;
    }

    .pet-card {
      background: #f9fafb;
      padding: 1rem;
      border-radius: 8px;
      margin-bottom: 1rem;
      border: 1px solid #e5e7eb;
    }

    .pet-card h3 {
      margin-top: 0;
      color: #111827;
    }

    .pet-info {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 0.5rem;
      font-size: 0.95rem;
    }

    .pet-info div {
      padding: 0.5rem;
    }

    .pet-info strong {
      display: block;
      color: #666;
      font-size: 0.85rem;
      margin-bottom: 0.25rem;
    }

    .btn {
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      transition: all 0.2s ease;
    }

    .btn-danger {
      background: #dc2626;
      color: #fff;
    }

    .btn-danger:hover {
      background: #b91c1c;
    }

    .btn-sm {
      padding: 0.4rem 0.8rem;
      font-size: 0.875rem;
      margin-top: 0.5rem;
    }

    .badge {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      border-radius: 9999px;
      font-size: 0.875rem;
      font-weight: 600;
    }

    .badge.pending {
      background: #fef3c7;
      color: #92400e;
    }

    .badge.approved {
      background: #dcfce7;
      color: #166534;
    }

    .badge.denied {
      background: #fee2e2;
      color: #991b1b;
    }

    .badge.cancelled {
      background: #f3f4f6;
      color: #374151;
    }
  </style>
</head>

<body>
  <main class="account-shell">
    <div class="account-header">
      <h1><i class="fa-solid fa-user-circle"></i> My Account</h1>
      <a href="/auth/logout" class="btn-logout">
        <i class="fa-solid fa-sign-out-alt"></i> Log Out
      </a>
    </div>

    <div class="account-tabs">
      <button class="active" data-tab="profile">Profile</button>
      <button data-tab="pets">My Pets</button>
      <button data-tab="emergency">Emergency Contacts</button>
      <button data-tab="bookings">My Bookings</button>
    </div>

    <!-- PROFILE TAB -->
    <div id="profile-tab" class="tab-content active">
      <div class="account-card">
        <h2>Profile Information</h2>
        <div id="profileMessage" class="message"></div>
        <form id="profileForm">
          <div class="form-grid">
            <div class="form-group">
              <label for="firstName">First Name</label>
              <input type="text" id="firstName" name="firstName" required />
            </div>
            <div class="form-group">
              <label for="lastName">Last Name</label>
              <input type="text" id="lastName" name="lastName" required />
            </div>
            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" id="email" name="email" required disabled />
            </div>
            <div class="form-group">
              <label for="phone">Phone</label>
              <input type="tel" id="phone" name="phone" />
            </div>
            <div class="form-group">
              <label for="streetAddress">Street Address</label>
              <input type="text" id="streetAddress" name="streetAddress" />
            </div>
            <div class="form-group">
              <label for="city">City</label>
              <input type="text" id="city" name="city" />
            </div>
            <div class="form-group">
              <label for="state">State</label>
              <input type="text" id="state" name="state" maxlength="2" />
            </div>
            <div class="form-group">
              <label for="zipCode">ZIP Code</label>
              <input type="text" id="zipCode" name="zipCode" />
            </div>
          </div>
          <button type="submit" class="btn-primary" style="margin-top: 1rem;">
            <i class="fa-solid fa-save"></i> Save Changes
          </button>
        </form>
      </div>
    </div>

    <!-- PETS TAB -->
    <div id="pets-tab" class="tab-content">
      <div class="account-card">
        <h2>My Pets</h2>
        <div id="petsMessage" class="message"></div>
        <div id="petsList"></div>

        <hr style="margin: 2rem 0; border: 0; border-top: 1px solid #e5e7eb;" />

        <h3>Add New Pet</h3>
        <form id="addPetForm">
          <div class="form-grid">
            <div class="form-group">
              <label for="petName">Pet Name *</label>
              <input type="text" id="petName" name="petName" required />
            </div>
            <div class="form-group">
              <label for="species">Species *</label>
              <select id="species" name="species" required>
                <option value="">Select...</option>
                <option value="Dog">Dog</option>
                <option value="Cat">Cat</option>
                <option value="Other">Other</option>
              </select>
            </div>
            <div class="form-group">
              <label for="breed">Breed</label>
              <input type="text" id="breed" name="breed" />
            </div>
            <div class="form-group">
              <label for="age">Age (years)</label>
              <input type="number" id="age" name="age" step="0.5" min="0" />
            </div>
            <div class="form-group">
              <label for="weight">Weight (lbs)</label>
              <input type="number" id="weight" name="weight" step="0.1" min="0" />
            </div>
            <div class="form-group">
              <label for="vaccinated">Vaccinated?</label>
              <select id="vaccinated" name="vaccinated">
                <option value="yes">Yes</option>
                <option value="no">No</option>
              </select>
            </div>
          </div>
          <button type="submit" class="btn-primary" style="margin-top: 1rem;">
            <i class="fa-solid fa-plus"></i> Add Pet
          </button>
        </form>
      </div>
    </div>

    <!-- Edit Pet Modal -->
    <div id="editPetModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center;">
      <div class="account-card" style="max-width: 600px; margin: 0 auto; max-height: 90vh; overflow-y: auto;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
          <h2 style="margin: 0;">Edit Pet</h2>
          <button type="button" onclick="closeEditPetModal()" style="background: none; border: none; font-size: 24px; cursor: pointer; color: #999;">&times;</button>
        </div>
        <form id="editPetForm">
          <div class="form-grid">
            <div class="form-group">
              <label for="editPetName">Pet Name *</label>
              <input type="text" id="editPetName" name="name" required />
            </div>
            <div class="form-group">
              <label for="editSpecies">Species *</label>
              <select id="editSpecies" name="species" required>
                <option value="">Select...</option>
                <option value="Dog">Dog</option>
                <option value="Cat">Cat</option>
                <option value="Other">Other</option>
              </select>
            </div>
            <div class="form-group">
              <label for="editBreed">Breed</label>
              <input type="text" id="editBreed" name="breed" />
            </div>
            <div class="form-group">
              <label for="editAge">Age (years)</label>
              <input type="number" id="editAge" name="age" step="0.5" min="0" />
            </div>
            <div class="form-group">
              <label for="editWeight">Weight (lbs)</label>
              <input type="number" id="editWeight" name="weight" step="0.1" min="0" />
            </div>
            <div class="form-group">
              <label for="editVaccinated">Vaccinated?</label>
              <select id="editVaccinated" name="vaccinated">
                <option value="yes">Yes</option>
                <option value="no">No</option>
              </select>
            </div>
          </div>
          <div style="display: flex; gap: 10px; margin-top: 1rem;">
            <button type="submit" class="btn-primary" style="flex: 1;">
              <i class="fa-solid fa-save"></i> Save Changes
            </button>
            <button type="button" class="btn-secondary" onclick="closeEditPetModal()" style="flex: 1;">
              Cancel
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- EMERGENCY CONTACTS TAB -->
    <div id="emergency-tab" class="tab-content">
      <div class="account-card">
        <h2>Emergency Contacts</h2>
        <div id="emergencyMessage" class="message"></div>
        <div id="emergencyList"></div>

        <hr style="margin: 2rem 0; border: 0; border-top: 1px solid #e5e7eb;" />

        <h3>Add Emergency Contact</h3>
        <form id="addEmergencyForm">
          <div class="form-grid">
            <div class="form-group">
              <label for="emergencyName">Contact Name *</label>
              <input type="text" id="emergencyName" name="name" required />
            </div>
            <div class="form-group">
              <label for="emergencyPhone">Contact Phone *</label>
              <input type="tel" id="emergencyPhone" name="phone" required />
            </div>
            <div class="form-group">
              <label for="emergencyEmail">Contact Email</label>
              <input type="email" id="emergencyEmail" name="email" />
            </div>
            <div class="form-group">
              <label for="emergencyRelationship">Relationship</label>
              <input type="text" id="emergencyRelationship" name="relationship" />
            </div>
          </div>
          <button type="submit" class="btn-primary" style="margin-top: 1rem;">
            <i class="fa-solid fa-plus"></i> Add Contact
          </button>
        </form>
      </div>
    </div>

    <!-- BOOKINGS TAB -->
    <div id="bookings-tab" class="tab-content">
      <div class="account-card">
        <h2>My Bookings</h2>
        <div id="bookingsMessage" class="message"></div>
        <div id="bookingsList">Loading...</div>
      </div>
    </div>
  </main>

  <script>
    const TAX_RATE = 0.08625; // SF sales tax

    // ------------------ TAB SWITCHING ------------------
    document.querySelectorAll('.account-tabs button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.account-tabs button').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));

        btn.classList.add('active');
        const tabId = btn.dataset.tab + '-tab';
        const tabEl = document.getElementById(tabId);
        if (tabEl) tabEl.classList.add('active');

        if (btn.dataset.tab === 'pets') loadPets();
        if (btn.dataset.tab === 'emergency') loadEmergencyContacts();
        if (btn.dataset.tab === 'bookings') loadBookings();
      });
    });

    // ------------------ MESSAGE HELPER ------------------
    function showMessage(tab, text, type) {
      const msg = document.getElementById(tab + 'Message');
      if (!msg) return;
      msg.textContent = text;
      msg.className = `message show ${type}`;
      setTimeout(() => msg.classList.remove('show'), 4000);
    }

    // ------------------ PROFILE ------------------
    async function loadProfile() {
      try {
        const res = await fetch('/api/user/profile');
        const data = await res.json();

        if (data.ok && data.user) {
          const u = data.user;
          document.getElementById('firstName').value = u.first_name || '';
          document.getElementById('lastName').value = u.last_name || '';
          document.getElementById('email').value = u.email || '';
          document.getElementById('phone').value = u.phone || '';
          document.getElementById('streetAddress').value = u.street_address || '';
          document.getElementById('city').value = u.city || '';
          document.getElementById('state').value = u.state || '';
          document.getElementById('zipCode').value = u.zip_code || '';
        } else if (res.status === 401) {
          window.location.href = '/signIn.html?redirect=/account.html';
        }
      } catch (err) {
        console.error('Error loading profile:', err);
      }
    }

    document.getElementById('profileForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);
      const data = Object.fromEntries(formData);

      try {
        const res = await fetch('/api/user/profile', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });

        const result = await res.json();
        showMessage('profile', result.ok ? 'Profile updated!' : result.error, result.ok ? 'success' : 'error');
      } catch (err) {
        showMessage('profile', 'Error updating profile', 'error');
      }
    });

    // ------------------ PETS ------------------
    async function loadPets() {
      try {
        const res = await fetch('/api/user/pets');
        const data = await res.json();
        const list = document.getElementById('petsList');

        if (res.status === 401) {
          window.location.href = '/signIn.html?redirect=/account.html';
          return;
        }

        if (data.ok && data.pets && data.pets.length > 0) {
          list.innerHTML = data.pets.map(pet => `
          <div class="pet-card">
            <h3>${pet.name} ${pet.is_primary ? '⭐' : ''}</h3>
            <div class="pet-info">
              <div><strong>Species</strong>${pet.species || 'N/A'}</div>
              <div><strong>Breed</strong>${pet.breed || 'N/A'}</div>
              <div><strong>Age</strong>${pet.age || 'N/A'} years</div>
              <div><strong>Weight</strong>${pet.weight || 'N/A'} lbs</div>
              <div><strong>Vaccinated</strong>${pet.vaccinated ? 'Yes' : 'No'}</div>
            </div>
            <button class="btn btn-primary btn-sm" onclick="openEditPetModal(${pet.id})">
              <i class="fa-solid fa-edit"></i> Edit
            </button>
            <button class="btn btn-danger btn-sm" onclick="deletePet(${pet.id})">
              <i class="fa-solid fa-trash"></i> Delete
            </button>
          </div>
        `).join('');
        } else {
          list.innerHTML = '<p>No pets registered yet.</p>';
        }
      } catch (err) {
        console.error('Error loading pets:', err);
        document.getElementById('petsList').innerHTML = '<p>Error loading pets.</p>';
      }
    }

    let currentEditingPetId = null;

    async function openEditPetModal(petId) {
      currentEditingPetId = petId;

      try {
        const res = await fetch('/api/user/pets');
        const data = await res.json();

        if (data.ok && data.pets) {
          const pet = data.pets.find(p => p.id === petId);
          if (pet) {
            document.getElementById('editPetName').value = pet.name || '';
            document.getElementById('editSpecies').value = pet.species || '';
            document.getElementById('editBreed').value = pet.breed || '';
            document.getElementById('editAge').value = pet.age || '';
            document.getElementById('editWeight').value = pet.weight || '';
            document.getElementById('editVaccinated').value = pet.vaccinated ? 'yes' : 'no';

            document.getElementById('editPetModal').style.display = 'flex';
          }
        }
      } catch (err) {
        showMessage('pets', '❌ Error loading pet data', 'error');
        console.error(err);
      }
    }

    function closeEditPetModal() {
      document.getElementById('editPetModal').style.display = 'none';
      currentEditingPetId = null;
      document.getElementById('editPetForm').reset();
    }

    document.getElementById('editPetForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      if (!currentEditingPetId) {
        showMessage('pets', '❌ Error: Pet ID not set', 'error');
        return;
      }

      const formData = new FormData(e.target);
      const data = Object.fromEntries(formData);
      data.vaccinated = data.vaccinated === 'yes';

      try {
        const res = await fetch(`/api/user/pets/${currentEditingPetId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        const result = await res.json();

        if (result.ok) {
          showMessage('pets', '✅ Pet updated!', 'success');
          closeEditPetModal();
          loadPets();
        } else {
          showMessage('pets', `❌ Error: ${result.error}`, 'error');
        }
      } catch (err) {
        showMessage('pets', '❌ Error updating pet', 'error');
        console.error(err);
      }
    });

    async function deletePet(petId) {
      if (!confirm('Are you sure you want to delete this pet? This action cannot be undone.')) return;

      try {
        const res = await fetch(`/api/user/pets/${petId}`, { method: 'DELETE' });
        const data = await res.json();

        if (data.ok) {
          showMessage('pets', 'Pet deleted successfully!', 'success');
          loadPets();
        } else {
          showMessage('pets', `Error: ${data.error}`, 'error');
        }
      } catch (err) {
        showMessage('pets', 'Error deleting pet', 'error');
        console.error(err);
      }
    }

    document.getElementById('addPetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);
      const data = Object.fromEntries(formData);

      try {
        const res = await fetch('/api/user/pets', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });

        const result = await res.json();
        showMessage('pets', result.ok ? 'Pet added!' : result.error, result.ok ? 'success' : 'error');
        if (result.ok) {
          e.target.reset();
          loadPets();
        }
      } catch (err) {
        showMessage('pets', 'Error adding pet', 'error');
      }
    });

    // ------------------ EMERGENCY CONTACTS ------------------
    async function loadEmergencyContacts() {
      try {
        const res = await fetch('/api/user/emergency-contacts');
        const data = await res.json();
        const list = document.getElementById('emergencyList');

        if (res.status === 401) {
          window.location.href = '/signIn.html?redirect=/account.html';
          return;
        }

        if (data.ok && data.contacts && data.contacts.length > 0) {
          list.innerHTML = data.contacts.map(contact => `
          <div class="pet-card">
            <h3>${contact.name} ${contact.is_primary ? '⭐' : ''}</h3>
            <div class="pet-info">
              <div><strong>Relationship</strong>${contact.relationship || 'N/A'}</div>
              <div><strong>Phone</strong>${contact.phone}</div>
              <div><strong>Email</strong>${contact.email || 'N/A'}</div>
            </div>
          </div>
        `).join('');
        } else {
          list.innerHTML = '<p>No emergency contacts yet.</p>';
        }
      } catch (err) {
        console.error('Error loading contacts:', err);
        document.getElementById('emergencyList').innerHTML = '<p>Error loading contacts.</p>';
      }
    }

    document.getElementById('addEmergencyForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);
      const data = Object.fromEntries(formData);

      try {
        const res = await fetch('/api/user/emergency-contacts', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });

        const result = await res.json();
        showMessage('emergency', result.ok ? 'Contact added!' : result.error, result.ok ? 'success' : 'error');
        if (result.ok) {
          e.target.reset();
          loadEmergencyContacts();
        }
      } catch (err) {
        showMessage('emergency', 'Error adding contact', 'error');
      }
    });

    // ------------------ BOOKING HELPERS ------------------
    function formatBookingDate(dateStr) {
      if (!dateStr) return '—';
      const s = String(dateStr);
      const match = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
      if (!match) return s;

      const year = parseInt(match[1], 10);
      const month = parseInt(match[2], 10);
      const day = parseInt(match[3], 10);
      if (isNaN(year) || isNaN(month) || isNaN(day)) return s;

      const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
      const monthLabel = months[month - 1] || match[2];

      return `${monthLabel} ${day}, ${year}`;
    }

    function formatBookingTime(timeStr) {
      if (!timeStr) return '—';
      return String(timeStr);
    }

    function displayBookingStatus(booking) {
      let status = booking.status || 'pending';
      if (booking.payment_status === 'paid' && status === 'pending') {
        status = 'approved';
      }
      return status;
    }

    // ------------------ CHANGE BOOKING SUPPORT ------------------
    let lastBookings = [];
    let servicesForChange = null;
    let addonsForChange = null;

    async function ensureChangeOptionsLoaded() {
      if (servicesForChange && addonsForChange) return;
      try {
        const [svcRes, addonRes] = await Promise.all([
          fetch('/api/admin/public/services'),
          fetch('/api/admin/public/addons')
        ]);
        const svcData = await svcRes.json();
        const addonData = await addonRes.json();

        servicesForChange = (svcData.ok && Array.isArray(svcData.services)) ? svcData.services : [];
        addonsForChange = (addonData.ok && Array.isArray(addonData.addons)) ? addonData.addons : [];
      } catch (err) {
        console.error('Error loading services/addons:', err);
        servicesForChange = [];
        addonsForChange = [];
      }
    }

    function buildChangeFormHtml(booking) {
      const dateMatch = String(booking.booking_date || '').match(/^(\d{4}-\d{2}-\d{2})/);
      const dateVal = dateMatch ? dateMatch[1] : '';
      const timeVal = String(booking.booking_time || '').slice(0, 5); // "HH:MM"

      let serviceOptions = '<option value="">Select service...</option>';
      servicesForChange.forEach(svc => {
        let selected = '';
        if (booking.service_id && svc.id === booking.service_id) {
          selected = ' selected';
        } else if (!booking.service_id && booking.service_name && svc.name === booking.service_name) {
          selected = ' selected';
        }
        serviceOptions += `<option value="${svc.id}"${selected}>${svc.name}</option>`;
      });

      let addonChecks = '';
      addonsForChange.forEach(addon => {
        addonChecks += `
        <label style="display:block; font-size:0.9rem; margin-bottom:0.25rem;">
          <input type="checkbox" name="addon" value="${addon.id}">
          ${addon.name} (+$${Number(addon.price).toFixed(2)})
        </label>
      `;
      });

      return `
      <form class="change-booking-form" style="margin-top:1rem; padding-top:1rem; border-top:1px solid #e5e7eb;">
        <div style="font-weight:600; margin-bottom:0.5rem;">Request a change</div>
        <div style="display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:0.5rem; margin-bottom:0.5rem;">
          <div>
            <label style="font-size:0.85rem;">Date</label>
            <input type="date" name="date" value="${dateVal}" required
                   style="width:100%; padding:0.35rem; border-radius:6px; border:1px solid #d1d5db;">
          </div>
          <div>
            <label style="font-size:0.85rem;">Time</label>
            <input type="time" name="time" value="${timeVal}" required
                   style="width:100%; padding:0.35rem; border-radius:6px; border:1px solid #d1d5db;">
          </div>
          <div>
            <label style="font-size:0.85rem;">Service</label>
            <select name="service" required
                    style="width:100%; padding:0.35rem; border-radius:6px; border:1px solid #d1d5db;">
              ${serviceOptions}
            </select>
          </div>
        </div>
        ${addonsForChange.length ? `
          <div style="margin-bottom:0.5rem;">
            <label style="font-size:0.85rem; display:block; margin-bottom:0.25rem;">Add-ons</label>
            <div>${addonChecks}</div>
          </div>
        ` : ''}
        <button type="submit" class="btn btn-primary btn-sm">
          Save &amp; continue to payment
        </button>
      </form>
    `;
    }

    async function requestChange(bookingId) {
      await ensureChangeOptionsLoaded();

      const booking = lastBookings.find(b => b.id === bookingId);
      if (!booking) return;

      const card = document.querySelector(`.pet-card[data-booking-id="${bookingId}"]`);
      if (!card) return;

      // Flip status visually to pending
      const statusSpan = card.querySelector('.badge');
      if (statusSpan) {
        statusSpan.textContent = 'pending';
        statusSpan.className = 'badge pending';
      }

      let container = card.querySelector('.change-booking-container');
      if (!container) {
        container = document.createElement('div');
        container.className = 'change-booking-container';
        card.appendChild(container);
      }
      container.innerHTML = buildChangeFormHtml(booking);

      const form = container.querySelector('.change-booking-form');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const fd = new FormData(form);

        const dateStr = fd.get('date');
        const timeStr = fd.get('time');
        const serviceId = fd.get('service') ? Number(fd.get('service')) : null;
        const addonIds = Array.from(form.querySelectorAll('input[name="addon"]:checked'))
          .map(cb => Number(cb.value));

        const serviceObj = servicesForChange.find(s => s.id === serviceId) || null;
        const selectedAddonObjs = addonsForChange.filter(a => addonIds.includes(a.id));

        const servicePrice = Number(serviceObj?.price || 0);
        const addonsSubtotal = selectedAddonObjs.reduce((sum, a) => sum + Number(a.price || 0), 0);
        const subtotal = servicePrice + addonsSubtotal;
        const tax = subtotal * TAX_RATE;
        const total = subtotal + tax;

        // 1) Send update to backend
        const body = {
          booking_date: dateStr,
          booking_time: timeStr,
          service_id: serviceId,
          addons: addonIds
        };

        try {
          const res = await fetch(`/api/user/bookings/${bookingId}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
          });

          if (!res.ok) {
            showMessage('bookings', 'Could not save change on server, but continuing to payment…', 'error');
          } else {
            const data = await res.json().catch(() => null);
            if (!data || !data.ok) {
              showMessage('bookings', 'Server did not confirm the change, continuing to payment…', 'error');
            } else {
              showMessage('bookings', 'Change saved. Redirecting to payment…', 'success');
            }
          }
        } catch (err) {
          console.error('Error requesting change:', err);
          showMessage('bookings', 'Error contacting server, continuing to payment…', 'error');
        }

        // 2) Update local booking object
        booking.booking_date = dateStr;
        booking.booking_time = timeStr;
        booking.service_id = serviceId;
        booking.service_name = serviceObj?.name || booking.service_name;

        booking.addons = selectedAddonObjs.map(a => ({
          id: a.id,
          name: a.name,
          price_at_purchase: Number(a.price || 0)
        }));
        booking.subtotal = Number(subtotal.toFixed(2));
        booking.tax = Number(tax.toFixed(2));
        booking.total = Number(total.toFixed(2));

        // Save override so it shows when you come back later
        const overrideKey = `bookingOverride_${bookingId}`;
        const overridePayload = {
          booking_date: booking.booking_date,
          booking_time: booking.booking_time,
          service_name: booking.service_name,
          addons: booking.addons,
          subtotal: booking.subtotal,
          tax: booking.tax,
          total: booking.total
        };
        localStorage.setItem(overrideKey, JSON.stringify(overridePayload));

        // 3) Prepare payment booking for payment.html
        const profileFirst = document.getElementById('firstName')?.value || '';
        const profileLast = document.getElementById('lastName')?.value || '';
        const ownerName =
          (booking.owner_name || booking.customer_name || '').trim()
          || `${profileFirst} ${profileLast}`.trim();

        const ownerEmail = booking.owner_email || document.getElementById('email')?.value || '';
        const ownerPhone = booking.owner_phone || document.getElementById('phone')?.value || '';
        const petName = booking.pet_name || '';

        const paymentBooking = {
          bookingId: bookingId,
          serviceLabel: booking.service_name || serviceObj?.name || 'Service',
          servicePrice: Number(servicePrice.toFixed(2)),
          date: formatBookingDate(dateStr),
          subtotal: Number(subtotal.toFixed(2)),
          tax: Number(tax.toFixed(2)),
          addons_total: Number(addonsSubtotal.toFixed(2)),
          total: Number(total.toFixed(2)),
          ownerName,
          ownerEmail,
          ownerPhone,
          petName,
          addons: selectedAddonObjs.map(a => ({
            label: a.name,
            price: Number(a.price || 0)
          }))
        };

        sessionStorage.setItem('booking', JSON.stringify(paymentBooking));
        sessionStorage.setItem('bookingExpiresAt', String(Date.now() + 15 * 60 * 1000));

        // 4) Redirect to payment
        processPayment(bookingId);
      });
    }

    // ------------------ BOOKINGS LIST ------------------
    async function deleteBooking(bookingId) {
      if (!confirm('Are you sure you want to cancel this booking? This action cannot be undone.')) return;

      try {
        const res = await fetch(`/api/user/bookings/${bookingId}`, { method: 'DELETE' });
        const data = await res.json();

        if (data.ok) {
          showMessage('bookings', 'Booking cancelled successfully!', 'success');
          loadBookings();
        } else {
          showMessage('bookings', `Error: ${data.error}`, 'error');
        }
      } catch (err) {
        showMessage('bookings', 'Error deleting booking', 'error');
        console.error(err);
      }
    }

    function renderBookingCard(booking, displayNumber, isActiveSection) {
      const statusText = displayBookingStatus(booking);
      const canRequestChange =
        isActiveSection && booking.status !== 'cancelled' && booking.status !== 'denied';
      const canCancel =
        isActiveSection && (booking.status === 'pending' || booking.status === 'approved');

      return `
      <div class="pet-card" data-booking-id="${booking.id}">
        <h3>Booking #${displayNumber}</h3>
        <div class="pet-info">
          <div><strong>Service:</strong> ${booking.service_name || 'N/A'}</div>
          <div><strong>Date:</strong> ${formatBookingDate(booking.booking_date)}</div>
          <div><strong>Time:</strong> ${formatBookingTime(booking.booking_time)}</div>
          <div><strong>Pet:</strong> ${booking.pet_name || 'N/A'}</div>
          <div>
            <strong>Status:</strong>
            <span class="badge ${statusText}">${statusText}</span>
          </div>
          <div>
            <strong>Payment:</strong>
            <span class="badge ${booking.payment_status === 'paid' ? 'success' : 'warning'}">
              ${booking.payment_status || 'unpaid'}
            </span>
          </div>
        </div>

        ${booking.addons && booking.addons.length > 0 ? `
          <div style="margin-top: 1rem; padding-top: 1rem; border-top: 1px solid #e5e7eb;">
            <strong style="display: block; margin-bottom: 0.5rem;">Add-ons:</strong>
            <ul style="margin: 0; padding-left: 1.5rem; font-size: 0.95rem;">
              ${booking.addons.map(addon => `
                <li>${addon.name} - $${parseFloat(addon.price_at_purchase).toFixed(2)}</li>
              `).join('')}
            </ul>
          </div>
        ` : ''}

        <div style="margin-top: 1rem; padding-top: 1rem; border-top: 1px solid #e5e7eb;">
          <strong>Total: $${parseFloat(booking.total).toFixed(2)}</strong>
        </div>

        <div style="margin-top: 1rem; display: flex; gap: 0.5rem; flex-wrap: wrap;">
          ${
            canRequestChange
              ? `<button class="btn btn-primary btn-sm" onclick="requestChange(${booking.id})">Request Change</button>`
              : ''
          }
          ${
            canCancel
              ? `<button class="btn btn-danger btn-sm" onclick="deleteBooking(${booking.id})">Cancel Booking</button>`
              : ''
          }
        </div>

        <div class="change-booking-container"></div>
      </div>
    `;
    }

    async function loadBookings() {
      try {
        const res = await fetch('/api/user/bookings');
        const data = await res.json();
        const list = document.getElementById('bookingsList');

        if (res.status === 401) {
          window.location.href = '/signIn.html?redirect=/account.html';
          return;
        }

        if (data.ok && data.bookings && data.bookings.length > 0) {
          const bookings = [...data.bookings];

          // Sort by date then time
          bookings.sort((a, b) => {
            const ad = new Date(a.booking_date);
            const bd = new Date(b.booking_date);
            if (!isNaN(ad.getTime()) && !isNaN(bd.getTime()) && ad.getTime() !== bd.getTime()) {
              return ad - bd;
            }
            const at = (a.booking_time || '').toString();
            const bt = (b.booking_time || '').toString();
            return at.localeCompare(bt);
          });

          lastBookings = bookings;

          // Apply local overrides from request-change + payment
          lastBookings.forEach(b => {
            const overrideKey = `bookingOverride_${b.id}`;
            const raw = localStorage.getItem(overrideKey);
            if (!raw) return;
            try {
              const ov = JSON.parse(raw);
              if (ov.booking_date) b.booking_date = ov.booking_date;
              if (ov.booking_time) b.booking_time = ov.booking_time;
              if (ov.service_name) b.service_name = ov.service_name;
              if (Array.isArray(ov.addons)) b.addons = ov.addons;
              if (typeof ov.subtotal === 'number') b.subtotal = ov.subtotal;
              if (typeof ov.tax === 'number') b.tax = ov.tax;
              if (typeof ov.total === 'number') b.total = ov.total;
            } catch (e) {
              console.warn('Bad override for booking', b.id, e);
            }
          });

          const activeBookings = lastBookings.filter(
            b => b.status !== 'cancelled' && b.status !== 'denied'
          );
          const pastBookings = lastBookings.filter(
            b => b.status === 'cancelled' || b.status === 'denied'
          );

          let html = '';

          if (activeBookings.length) {
            html += `<h3>Upcoming &amp; Active Bookings</h3>`;
            html += activeBookings
              .map((booking, idx) => renderBookingCard(booking, idx + 1, true))
              .join('');
          } else {
            html += `<p>No active bookings.</p>`;
          }

          if (pastBookings.length) {
            html += `
            <hr style="margin: 2rem 0; border: 0; border-top: 1px solid #e5e7eb;" />
            <h3>Past &amp; Cancelled Bookings</h3>
          `;
            html += pastBookings
              .map((booking, idx) => renderBookingCard(booking, idx + 1, false))
              .join('');
          }

          list.innerHTML = html;
        } else {
          list.innerHTML = '<p>No bookings yet.</p>';
        }
      } catch (err) {
        console.error('Error loading bookings:', err);
        document.getElementById('bookingsList').innerHTML = '<p>Error loading bookings.</p>';
      }
    }

    // ------------------ PAYMENT REDIRECT ------------------
    function processPayment(bookingId) {
      window.location.href = `/payment.html?bookingId=${bookingId}`;
    }

    // ------------------ INIT ------------------
    loadProfile();
    loadPets();

    if (window.location.hash === '#bookings') {
      const bookingsBtn = document.querySelector('.account-tabs button[data-tab="bookings"]');
      if (bookingsBtn) bookingsBtn.click();
    }

    // Expose functions for inline onclick
    window.openEditPetModal = openEditPetModal;
    window.closeEditPetModal = closeEditPetModal;
    window.deletePet = deletePet;
    window.deleteBooking = deleteBooking;
    window.processPayment = processPayment;
    window.requestChange = requestChange;
  </script>
</body>

</html>
