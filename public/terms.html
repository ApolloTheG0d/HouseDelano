  <script>
    // Basic a11y-friendly mobile nav toggle (no framework)
    (function() {
      var btn = document.querySelector('.nav-toggle');
      var list = document.getElementById('primary-nav');
      if (!btn || !list) return;
      btn.addEventListener('click', function() {
        var expanded = this.getAttribute('aria-expanded') === 'true';
        this.setAttribute('aria-expanded', String(!expanded));
        list.classList.toggle('open');
      });
    })();
  </script>

  <script>
fetch('legalese/TOS.json').then(r=>r.json()).then(d=>{
  const s=document.getElementById('tos-section');
  s.innerHTML =
    `<h2>${d.title||'Terms of Service'}</h2>` +
    (d.lastUpdated?`<div class="legal-meta">Last updated: ${d.lastUpdated}</div>`:'') +
    `<div class="legal-content">` +
      (d.sections||[]).map(sec =>
        (sec.heading?`<h3>${sec.heading}</h3>`:'') +
        (sec.paragraphs||[]).map(p=>`<p>${p}</p>`).join('') +
        (sec.bullets?`<ul>${sec.bullets.map(b=>`<li>${b}</li>`).join('')}</ul>`:'')
      ).join('') +
    `</div>`;
}).catch(console.error);

</script>
